name: CI

# Lint + test on every push and PR so a broken main never happens quietly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        if: runner.os != 'Windows'
        run: |
          diff <(gofmt -l .) /dev/null

      - name: go test
        run: go test -race -count=1 ./...
