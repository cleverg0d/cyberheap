name: Release

# Build cross-platform binaries and attach them to the GitHub Release
# whenever a v* tag is pushed. Binaries are stripped, reproducibly built,
# and accompanied by a SHA-256 checksums file.
#
# Run locally instead:
#   make build
# Or cross-compile all targets:
#   for t in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 windows-amd64; do
#     GOOS=${t%%-*} GOARCH=${t#*-} go build \
#       -trimpath -ldflags "-s -w -X github.com/cleverg0d/cyberheap/internal/cli.Version=$(git describe --tags --always)" \
#       -o dist/cyberheap-$t$( [[ $t == windows-* ]] && echo .exe) ./cmd/cyberheap
#   done

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -eux
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="dist/cyberheap-${GOOS}-${GOARCH}${ext}"

          # -trimpath strips local paths; -s -w drops symbol + DWARF.
          # The version is injected so `cyberheap --version` reports the tag.
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/cleverg0d/cyberheap/internal/cli.Version=${{ steps.ver.outputs.version }}" \
            -o "$out" ./cmd/cyberheap

          sha256sum "$out" > "${out}.sha256"

      - name: Package archive
        run: |
          set -eux
          cd dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          base="cyberheap-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          archive="cyberheap-${{ steps.ver.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${archive}.zip" "$base"
            sha256sum "${archive}.zip" > "${archive}.zip.sha256"
          else
            tar czf "${archive}.tar.gz" "$base"
            sha256sum "${archive}.tar.gz" > "${archive}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cyberheap-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/cyberheap-${{ steps.ver.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          set -eux
          cd dist
          # Re-create a single SHA-256 file covering every shipped archive,
          # in a format `sha256sum -c` can verify in one go.
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS.txt || true
          cat SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
